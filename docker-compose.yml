services:
  postgres:
    image: postgres:16-alpine
    container_name: audit-poc-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGSUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${PGSUPERPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-postgres}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGSUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=4MB

  adminer:
    image: adminer:latest
    container_name: audit-poc-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  pgdata:
